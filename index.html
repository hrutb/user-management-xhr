    <div class="container">
            <div class="row">
                <div class="col-md-6 offset-md-3 mb-4">
                    <div class="card">
                         <div class="card-header">
                            <h4 class="text-center text-light"><span><i class="fa-solid fa-users"></i></span>User Management</h4>
                         </div>
                         <div class="card-body">
                             <form action="" id="userForm">
                                 <div class="form-group">
                                     <label for="name">Full Name*</label>
                                     <input type="text" id="name" class="form-control">
                                 </div>
     
                                 <div class="form-group">
                                     <label for="userName">User Name*</label>
                                     <input required type="text" id="username" class="form-control">
                                 </div>
     
                                 <div class="form-group">
                                    <label for="email">Email*</label>
                                    <input  required type="email" id="email" class="form-control">
                                 </div>
                                   
                                 <div class="form-group">
                                    <label for="contact">Contact*</label>
                                    <input required type="text" id="contact" class="form-control">
                                 </div>
     
                             </form>
                         </div>
                         <div class="card-footer">
                            <button class="btn btn-block btn-outline-light" type="button" id="addUser"><span><i class="fa-solid fa-plus"></i></span>Add User</button>
                            <button class="btn btn-block btn-outline-light d-none" id="updateUser" type="button"><span><i class="fa-solid fa-plus"></i></span>Update User</button>
                         
                        </div>
                    </div>
                </div>
            </div>
    </div>
